name: Build Nuitka Binaries

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            exe_ext: ''
            artifact_name: smoll-linux
          - os: windows-latest
            exe_ext: '.exe'
            artifact_name: smoll-windows

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Linux system packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf   # needed by Nuitka to rewrite RPATH
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install build requirements
        run: |
          python -m pip install --upgrade pip
          # Nuitka + a few libraries it often needs
          python -m pip install nuitka ordered-set tqdm
      - name: Compile with Nuitka
        run: |
          nuitka --standalone --onefile \
                 --output-filename=smoll \
                 smoll.py
          mv "smoll${{ matrix.exe_ext }}" "smoll-${{ matrix.os }}${{ matrix.exe_ext }}"
      - name: Quick sanity check
        run: |
          chmod +x "smoll-${{ matrix.os }}${{ matrix.exe_ext }}" || true
          "./smoll-${{ matrix.os }}${{ matrix.exe_ext }}" --help || true
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: smoll-${{ matrix.os }}${{ matrix.exe_ext }}
          retention-days: 30
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repo (for changelog, etc.)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: smoll-linux
          path: ./release-assets
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: smoll-windows
          path: ./release-assets
      - name: Generate release notes (auto‑changelog)
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "First release – no previous tag." >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
      - name: Create GitHub Release & upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: false
          draft: false
          prerelease: false
          files: |
            ./release-assets/smoll-ubuntu-latest
            ./release-assets/smoll-windows-latest.exe