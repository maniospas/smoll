name: Build & Release Nuitka Binaries

# -------------------------------------------------
# Run on a version tag (vX.Y.Z) or manual trigger
# -------------------------------------------------
on:
  push:
  workflow_dispatch:     # manual button in the UI

env:
  RELEASE_NAME: ${{ github.ref_name }}

jobs:
  # =================================================
  # 1️⃣ Build matrix – Linux and Windows
  # =================================================
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            exe_ext: ''               # Linux binary has no extension
            artifact_name: smoll-linux
          - os: windows-latest
            exe_ext: '.exe'           # Windows binary
            artifact_name: smoll-windows

    steps:
      # -------------------------------------------------
      # Checkout source
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # Linux only – install patchelf (required by Nuitka)
      # -------------------------------------------------
      - name: Install Linux packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      # -------------------------------------------------
      # Windows only – fetch Dependency Walker
      # -------------------------------------------------
      - name: Install Dependency Walker (Windows only)
        if: runner.os == 'Windows'
        run: |
          # 1️⃣ Create a folder for the binary
          mkdir -p $HOME/dependency-walker

          # 2️⃣ Download the tiny portable 64‑bit build (≈150 KB)
          curl -L -o $HOME/dependency-walker/depends.exe \
                https://github.com/lukasjapan/dependency-walker/releases/download/2.2/depends.exe

          # 3️⃣ Add the folder to the runner's PATH for the rest of the job
          echo "$HOME/dependency-walker" >> $GITHUB_PATH

          # 4️⃣ (Optional) Explicitly tell Nuitka where it is.
          #    This is helpful if the PATH trick ever fails.
          echo "NUITKA_DEPENDS_EXE=$HOME/dependency-walker/depends.exe" >> $GITHUB_ENV

      # -------------------------------------------------
      # Set up Python (no pip cache – we have no requirements.txt)
      # -------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # change if you need a different version

      # -------------------------------------------------
      # Install Nuitka and the optional “one‑file” extras
      # -------------------------------------------------
      - name: Install build requirements
        run: |
          python -m pip install --upgrade pip

          # Pull Nuitka together with the onefile extras (brings in zstandard)
          python -m pip install "Nuitka[onefile]" ordered-set tqdm

          # If you prefer to install them piece‑by‑piece:
          # python -m pip install nuitka zstandard ordered-set tqdm

      # -------------------------------------------------
      # Compile with Nuitka (same command works on both OSes)
      # -------------------------------------------------
      - name: Compile with Nuitka
        run: |
          # The `--noask` flag forces Nuitka to take the default (yes) for any
          # interactive question – crucial for CI.
          python -m nuitka \
                --standalone \
                --onefile \
                --output-filename=smoll \
                --noask \
                smoll.py

          # Rename so we know which runner produced the file
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            mv "smoll" "smoll-${{ matrix.os }}"
          else
            mv "smoll.exe" "smoll-${{ matrix.os }}${{ matrix.exe_ext }}"
          fi
        shell: bash   # Git‑for‑Windows provides Bash on the Windows runner

      # -------------------------------------------------
      # (Optional) quick sanity‑check that the binary launches
      # -------------------------------------------------
      - name: Sanity check
        run: |
          chmod +x "smoll-${{ matrix.os }}${{ matrix.exe_ext }}" || true
          "./smoll-${{ matrix.os }}${{ matrix.exe_ext }}" --help || true

      # -------------------------------------------------
      # Upload the binary as a temporary artifact for the release job
      # -------------------------------------------------
      - name: Upload binary for release job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: smoll-${{ matrix.os }}${{ matrix.exe_ext }}
          retention-days: 30

  # =================================================
  # 2️⃣ Release job – runs once after *all* builds succeed
  # =================================================
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to create a release + upload assets

    steps:
      # -------------------------------------------------
      # Checkout (only needed if you want to generate a changelog)
      # -------------------------------------------------
      - name: Checkout (for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------
      # Download the Linux and Windows artifacts produced above
      # -------------------------------------------------
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: smoll-linux
          path: ./release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: smoll-windows
          path: ./release-assets

      # -------------------------------------------------
      # (Optional) generate simple release notes automatically
      # -------------------------------------------------
      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "notes=First release" >> $GITHUB_OUTPUT
          else
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      # -------------------------------------------------
      # Create (or update) the GitHub Release and attach the binaries
      # -------------------------------------------------
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            ./release-assets/smoll-ubuntu-latest
            ./release-assets/smoll-windows-latest.exe
